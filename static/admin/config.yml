backend:
  name: github
  repo: cardopoli/this-was-tomorrow
  branch: main
  base_url: https://sveltia-cms-auth.cardopoli.workers.dev
site_url: https://thiswastomorrow.co.uk
display_url: https://thiswastomorrow.co.uk
media_folder: "static/images"
public_folder: "/images"

media_libraries:
  all:
    slugify_filename: true
    transformations:
      raster_image:
        format: webp
        quality: 85
        width: 2048
        height: 2048

collections:

  - name: sites
    label: Sites
    label_singular: Site
    folder: content/sites
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"

    # Shows title · location · status in the Sveltia list view
    summary: "{{title}} · {{location}} · {{status}}"

    # Thumbnail from hero image in list view
    thumbnail: image

    # "View on site" button when editing
    preview_path: "/sites/{{slug}}/"

    # Sort options in Sveltia
    sortable_fields:
      fields: [title, location, visit_date, status]
      default:
        field: title
        direction: ascending

    # Quick filter buttons
    view_filters:
      - label: Visited
        field: status
        pattern: visited
      - label: Scheduled
        field: status
        pattern: scheduled
      - label: Drafts
        field: draft
        pattern: true

    # Group by status
    view_groups:
      - label: Status
        field: status

    fields:
      - { name: title, label: Site Title, widget: string }
      - { name: location, label: Location, widget: string, required: false }
      - { name: status, label: Status, widget: select, options: ["visited", "scheduled", "planned"], required: false }
      - { name: visit_date, label: Visit Date, widget: string, required: false, hint: "e.g. April 2026" }
      - { name: draft, label: Draft (hide from site), widget: boolean, default: false, required: false }
      - { name: description, label: Short Description, widget: text, required: false }

      - name: photos
        label: Hero Photo
        widget: list
        required: false
        max: 1
        fields:
          - { name: image, label: Image, widget: image }
          - { name: caption, label: Caption, widget: string, required: false }

      - { name: image, label: OG Share Image (optional override), widget: image, required: false, hint: "Used when sharing on social media. Leave blank to use hero photo." }

      - { name: dropbox_audio, label: Dropbox Audio Folder, widget: string, required: false, hint: "Shared Dropbox folder link containing MP3 files" }

      - { name: body_intro, label: Text Before Gallery, widget: markdown, required: false, modes: [rich_text, raw] }

      - { name: dropbox_gallery, label: Dropbox Gallery (first), widget: string, required: false, hint: "Paste the shared Dropbox folder link" }

      - { name: body_middle, label: Text Between Galleries, widget: markdown, required: false, modes: [rich_text, raw] }

      - { name: dropbox_gallery_2, label: Dropbox Gallery (second), widget: string, required: false, hint: "Optional second Dropbox folder link" }


      - { name: body, label: Main Content, widget: markdown, required: false, modes: [rich_text, raw] }

      - name: audio
        label: Audio
        widget: list
        required: false
        fields:
          - { name: title, label: Title, widget: string }
          - { name: url, label: Archive.org URL, widget: string }
          - { name: duration, label: Duration (e.g. 24 min), widget: string, required: false }

      - name: archives
        label: Archive.org Recordings
        widget: list
        required: false
        fields:
          - { name: title, label: Title, widget: string }
          - { name: url, label: URL, widget: string }
          - { name: note, label: Note, widget: text, required: false }

      - name: videos
        label: Videos
        widget: list
        required: false
        fields:
          - { name: title, label: Title, widget: string }
          - { name: url, label: Embed URL, widget: string }
          - { name: description, label: Description, widget: text, required: false }

      - name: sources
        label: Sources
        widget: list
        required: false
        fields:
          - { name: title, label: Title, widget: string }
          - { name: url, label: URL, widget: string }

      - name: links
        label: Links (bottom of page)
        widget: list
        required: false
        fields:
          - { name: url, label: URL, widget: string }
          - { name: title, label: Title, widget: string }
          - { name: source, label: Source, widget: string, required: false }

  - name: pages
    label: Pages
    files:
      - name: about
        label: About
        file: content/about.md
        fields:
          - { name: title, label: Title, widget: string }
          - { name: description, label: Meta description, widget: string, required: false }
          - { name: layout, label: Layout, widget: hidden, default: about }
          - { name: body, label: Content, widget: markdown, modes: [rich_text, raw] }

      - name: homepage
        label: Homepage
        file: content/_index.md
        fields:
          - { name: title, label: Site title (browser tab), widget: string }
          - { name: intro, label: Intro text, widget: text, hint: "The paragraph above the list of sites." }

      - name: map
        label: Map
        file: content/map.md
        fields:
          - { name: title, label: Title, widget: string }
          - { name: description, label: Meta description, widget: string, required: false }
          - { name: layout, label: Layout, widget: hidden, default: map }
