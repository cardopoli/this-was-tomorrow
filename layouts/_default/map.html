{{ define "main" }}
<article class="map-page">
  <h1>{{ .Title }}</h1>
  <p class="map-intro">Site visits across the UK.</p>
  <div class="map-embed">
    <iframe
      src="https://www.google.com/maps/d/embed?mid=1Rbs498KwaOyNyzOebAa4vOV6WXeQLL4&ehbc=2E312F"
      width="100%"
      height="500"
      frameborder="0"
      style="border:0"
      allowfullscreen
      loading="lazy">
    </iframe>
  </div>

  <ul class="map-site-list">
    {{ range (where .Site.RegularPages "Section" "sites").ByTitle }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="map-location">{{ .Params.location }}</span>
    </li>
    {{ end }}
  </ul>
</article>
{{ end }}
