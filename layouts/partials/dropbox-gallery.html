<!-- Dropbox Masonry Gallery via Cloudflare Worker proxy -->

<div id="dropbox-gallery" class="dbx-gallery">
  <div class="dbx-loading">Loading images...</div>
</div>

<style>
.dbx-gallery {
  margin: 48px 0;
}

.dbx-loading {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: #666;
  padding: 24px 0;
}

.dbx-error {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: #900;
  padding: 24px 0;
}

.masonry {
  columns: 2;
  column-gap: 12px;
}

.masonry-item {
  break-inside: avoid;
  margin-bottom: 0px;
  overflow: hidden;
  background: #eee;
}

.masonry-item img {
  width: 100%;
  height: auto;
  display: block;
  transition: opacity 0.3s ease;
}

.masonry-item img:hover {
  opacity: 0.92;
}

.dbx-lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 9999;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

.dbx-lightbox.active {
  display: flex;
}

.dbx-lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  display: block;
}

.dbx-lightbox-close {
  position: fixed;
  top: 20px; right: 28px;
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  line-height: 1;
}

@media (max-width: 600px) {
  .masonry { columns: 1; }
}
</style>

<div class="dbx-lightbox" id="dbxLightbox">
  <span class="dbx-lightbox-close" id="dbxClose">✕</span>
  <img id="dbxLightboxImg" src="" alt="">
</div>

<script>
(function() {

  var PROXY = 'https://dropbox-proxy.cardopoli.workers.dev';
  var SHARED_LINK = '{{ .Params.dropbox_gallery }}';

  var gallery = document.getElementById('dropbox-gallery');

  if (!SHARED_LINK || SHARED_LINK === '') {
    gallery.innerHTML = '';
    return;
  }

  function proxyFetch(endpoint, body) {
    return fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: endpoint, body: body })
    }).then(function(r) { return r.json(); });
  }

  proxyFetch('files/list_folder', {
    path: '',
    shared_link: { url: SHARED_LINK },
    recursive: false
  })
  .then(function(data) {

    if (data.error) {
      gallery.innerHTML = '<div class="dbx-error">Could not load images: ' + (data.error_summary || 'unknown error') + '</div>';
      return;
    }

    var images = (data.entries || []).filter(function(f) {
      return f['.tag'] === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
    });

    if (images.length === 0) {
      gallery.innerHTML = '<div class="dbx-error">No images found in this folder.</div>';
      return;
    }

    var html = '<div class="masonry">';
    images.forEach(function(img) {
      html += '<div class="masonry-item">';
      html += '<img src="" data-path="' + img.path_lower + '" alt="' + img.name + '" loading="lazy">';
      html += '</div>';
    });
    html += '</div>';
    gallery.innerHTML = html;

    images.forEach(function(img) {
      proxyFetch('files/get_temporary_link', { path: img.path_lower })
      .then(function(d) {
        if (d.link) {
          var el = gallery.querySelector('img[data-path="' + img.path_lower + '"]');
          if (el) el.src = d.link;
        }
      });
    });

    var lightbox = document.getElementById('dbxLightbox');
    var lightboxImg = document.getElementById('dbxLightboxImg');
    var closeBtn = document.getElementById('dbxClose');

    gallery.addEventListener('click', function(e) {
      if (e.target.tagName === 'IMG' && e.target.src) {
        lightboxImg.src = e.target.src;
        lightbox.classList.add('active');
      }
    });

    lightbox.addEventListener('click', function() {
      lightbox.classList.remove('active');
    });

    closeBtn.addEventListener('click', function() {
      lightbox.classList.remove('active');
    });

  })
  .catch(function(err) {
    gallery.innerHTML = '<div class="dbx-error">Error loading gallery: ' + err.message + '</div>';
  });

})();
</script>
