{{ define "main" }}
  <section class="list-page">
    <h1>{{ .Title }}</h1>

    <div class="list-grid">
      {{ range .Pages }}
        <article class="list-item">
          <a href="{{ .RelPermalink }}">
            {{ with .Params.image }}
              <img src="{{ . }}" alt="{{ $.Title }}">
            {{ end }}
            <h2>{{ .Title }}</h2>
          </a>
        </article>
      {{ end }}
    </div>
  </section>
{{ end }}
