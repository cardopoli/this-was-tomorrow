
<!-- Dropbox Masonry Gallery
     Drop this into your Hugo page content body
     or include it as a partial -->

<div id="dropbox-gallery" class="dbx-gallery">
  <div class="dbx-loading">Loading images...</div>
</div>

<style>
.dbx-gallery {
  margin: 48px 0;
}

.dbx-loading {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: #666;
  padding: 24px 0;
}

.dbx-error {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: #900;
  padding: 24px 0;
}

.masonry {
  columns: 2;
  column-gap: 12px;
}

.masonry-item {
  break-inside: avoid;
  margin-bottom: 12px;
  overflow: hidden;
  background: #eee;
}

.masonry-item img {
  width: 100%;
  height: auto;
  display: block;
  transition: opacity 0.3s ease;
}

.masonry-item img:hover {
  opacity: 0.92;
}

/* Lightbox */
.dbx-lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 9999;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

.dbx-lightbox.active {
  display: flex;
}

.dbx-lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  display: block;
}

.dbx-lightbox-close {
  position: fixed;
  top: 20px; right: 28px;
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  line-height: 1;
}

@media (max-width: 600px) {
  .masonry { columns: 1; }
}
</style>

<div class="dbx-lightbox" id="dbxLightbox">
  <span class="dbx-lightbox-close" id="dbxClose">✕</span>
  <img id="dbxLightboxImg" src="" alt="">
</div>

<script>
(function() {

  // ── CONFIG ──────────────────────────────────────────────
 var TOKEN = null; // handled by proxy
 var PROXY_URL = 'https://dropbox-proxy.YOUR-SUBDOMAIN.workers.dev';
     
  var gallery = document.getElementById('dropbox-gallery');

  // Fetch file list from shared folder
  fetch('https://api.dropboxapi.com/2/files/list_folder', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + TOKEN,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      path: '',
      shared_link: { url: SHARED_LINK },
      recursive: false
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {

    if (data.error) {
      gallery.innerHTML = '<div class="dbx-error">Could not load images: ' + (data.error_summary || 'unknown error') + '</div>';
      return;
    }

    // Filter to images only
    var images = (data.entries || []).filter(function(f) {
      return f['.tag'] === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
    });

    if (images.length === 0) {
      gallery.innerHTML = '<div class="dbx-error">No images found in this folder.</div>';
      return;
    }

    // Build masonry grid
    var html = '<div class="masonry">';
    images.forEach(function(img) {
      // Build direct image URL from shared link + file path
      var directUrl = 'https://api.dropboxapi.com/2/files/get_temporary_link';
      html += '<div class="masonry-item" data-path="' + img.path_lower + '">';
      html += '<img src="" data-path="' + img.path_lower + '" alt="' + img.name + '" loading="lazy">';
      html += '</div>';
    });
    html += '</div>';
    gallery.innerHTML = html;

    // Load each image via temporary link
    images.forEach(function(img) {
      fetch('https://api.dropboxapi.com/2/files/get_temporary_link', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + TOKEN,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ path: img.path_lower })
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.link) {
          var el = gallery.querySelector('img[data-path="' + img.path_lower + '"]');
          if (el) el.src = d.link;
        }
      });
    });

    // Lightbox
    var lightbox = document.getElementById('dbxLightbox');
    var lightboxImg = document.getElementById('dbxLightboxImg');
    var closeBtn = document.getElementById('dbxClose');

    gallery.addEventListener('click', function(e) {
      if (e.target.tagName === 'IMG' && e.target.src) {
        lightboxImg.src = e.target.src;
        lightbox.classList.add('active');
      }
    });

    lightbox.addEventListener('click', function() {
      lightbox.classList.remove('active');
    });

    closeBtn.addEventListener('click', function() {
      lightbox.classList.remove('active');
    });

  })
  .catch(function(err) {
    gallery.innerHTML = '<div class="dbx-error">Error loading gallery: ' + err.message + '</div>';
  });

})();
</script>
