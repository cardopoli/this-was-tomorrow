<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-gb" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} · {{ .Site.Title }}</title>
  <link rel="icon" href="{{ "favicon.png" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <div class="wrap">

    {{ with .Params.exhibit_image }}
      <div class="photo-hero">
        <img src="{{ . }}" alt="{{ $.Params.location }}">
      </div>
    {{ end }}

    {{ with .Params.location }}
      <div class="meta">{{ . }}</div>
    {{ end }}

    {{ .Content }}

  </div>

  <script src="{{ "JS/supercharged.js" | relURL }}"></script>
</body>
</html>
