backend:
  name: github
  repo: cardopoli/this-was-tomorrow
  branch: main
site_url: https://thiswastomorrow.co.uk
display_url: https://thiswastomorrow.co.uk
media_folder: "static/images"
public_folder: "/images"
collections:
  - name: sites
    label: Sites
    folder: content/sites
    create: true
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: Site Title, widget: string }
      - { name: location, label: Location, widget: string, required: false }
      - { name: status, label: Status, widget: select, options: ["visited", "scheduled", "planned"], required: false }
      
      - name: photos
        label: Hero Photo
        widget: list
        required: false
        max: 1
        fields:
          - { name: image, label: Image, widget: image }
          - { name: caption, label: Caption, widget: string, required: false }
      
      - { name: body_intro, label: Text Section 1, widget: markdown, required: false }
      
      - { name: dropbox_gallery, label: Dropbox Gallery, widget: string, required: false }
      
      - { name: body_main, label: Text Section 2, widget: markdown, required: false }
      
      - name: links
        label: Links
        widget: list
        required: false
        fields:
          - { name: url, label: URL, widget: string }
          - { name: title, label: Title, widget: string }
          - { name: source, label: Source, widget: string, required: false }
