<!DOCTYPE html>
<html lang="en-gb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }} - Site Visit Archive{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="icon" href="https://64.media.tumblr.com/3d00e55fb38d8b65bb11700ee4db779f/bf5b75c0c8a48cda-30/s640x960/9b15eaf272f6e614a494ad334b4cd8394742bed3.gifv">
    <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
    <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="og:image" content="https://64.media.tumblr.com/3d00e55fb38d8b65bb11700ee4db779f/bf5b75c0c8a48cda-30/s640x960/9b15eaf272f6e614a494ad334b4cd8394742bed3.gifv">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <script src="/js/carousel.js"></script>
</head>
<body>
    <div class="wrap">
        {{ partial "header.html" . }}
        {{ block "main" . }}{{ end }}
        {{ partial "footer.html" . }}
    </div>
</body>
</html>
