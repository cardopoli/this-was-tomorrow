[params]
tagline = "Is This the Future We Were Dreaming Of?"
footer_project = "This Was Tomorrow is a photographic investigation into community-led housing across the UK. Not the theory of it - the actual daily practice: land held in common, housing built and governed by the people who live in it, decisions made collectively. These places already exist. The project treats them not as proof that things could be different, but as evidence that they already are - quietly, imperfectly, without waiting for permission. Utopia here is a method, not a promise. The question isn't whether another way of living is possible. It's why we keep pretending it isn't.\n\nAn archive of site visits documenting how communities adapt and sustain places they inherit. Photography, audio, context.\n\nA photographic investigation by Enrico Policardo into community-led housing across the UK."
footer_credit = "This Was Tomorrow is supported by Arts Council England (DYCP)"
email = "info@enricopolicardo.com"
description = "Site Visit Archive"
author = "Enrico Policardo"
phone = "+44(0)7517 420 206"

