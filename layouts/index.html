{{ define "main" }}
<div class="site-index">
    <p class="intro">{{ .Params.intro }}</p>

    <ul class="site-list">
        {{ range (where .Site.RegularPages "Section" "sites").ByTitle }}
        <li class="status-{{ .Params.status | default "planned" }}">
            <a href="{{ .RelPermalink }}">
                <span class="name">
                    {{ .Title }}
                    {{ if eq .Params.status "visited" }}<span class="status-dot" title="Visited"></span>{{ end }}
                </span>
                <span class="location">
                    {{ .Params.location }}
                    {{ with .Params.visit_date }}<span class="visit-date">{{ . }}</span>{{ end }}
                </span>
            </a>
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
