{{ define "main" }}
<article class="map-page">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  <ul class="map-site-list">
    {{ range (where (where .Site.RegularPages "Section" "sites") ".Params.status" "visited").ByTitle }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span class="map-location">{{ .Params.location }}</span>
    </li>
    {{ end }}
  </ul>
</article>
{{ end }}
