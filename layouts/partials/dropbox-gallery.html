<!-- Dropbox Masonry Gallery - gallery 1
     CSS: static/css/style.css (.dbx-* .masonry-*)
     Lightbox DOM: layouts/partials/lightbox.html (rendered once in baseof)
     Requires: Promise.all, element.closest (all modern browsers) -->

<div id="dropbox-gallery" class="dbx-gallery" aria-live="polite">
  <div class="dbx-skeleton">
    <div class="dbx-skeleton-item"></div>
    <div class="dbx-skeleton-item"></div>
    <div class="dbx-skeleton-item"></div>
    <div class="dbx-skeleton-item"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var PROXY      = 'https://dropbox-proxy.cardopoli.workers.dev';
  var SHARED_URL = '{{ .Params.dropbox_gallery }}';
  var gallery    = document.getElementById('dropbox-gallery');

  if (!SHARED_URL || SHARED_URL === '') { gallery.innerHTML = ''; return; }

  function proxyFetch(endpoint, body) {
    return fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: endpoint, body: body })
    }).then(function(r) {
      if (!r.ok) throw new Error('Proxy ' + r.status);
      return r.json();
    });
  }

  function makeFadeImg(src, alt) {
    var img = document.createElement('img');
    img.alt = alt;
    img.setAttribute('loading', 'lazy');
    img.onload  = function() { img.classList.add('loaded'); };
    img.onerror = function() { img.classList.add('loaded'); };
    img.src = src;
    return img;
  }

  function openLightbox(src, alt) {
    var lb    = document.getElementById('dbxLightbox');
    var lbImg = document.getElementById('dbxLightboxImg');
    if (!lb || !lbImg) return;
    lbImg.src = src;
    lbImg.alt = alt || '';
    lb.classList.add('active');
  }

  /* Lightbox close handlers - init once via flag on the element */
  function initLightboxControls() {
    var lb = document.getElementById('dbxLightbox');
    if (!lb || lb.dataset.bound) return;
    lb.dataset.bound = '1';

    document.getElementById('dbxClose').addEventListener('click', function(e) {
      e.stopPropagation();
      lb.classList.remove('active');
    });
    lb.addEventListener('click', function() {
      lb.classList.remove('active');
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') lb.classList.remove('active');
    });
  }

  /* Main */
  proxyFetch('files/list_folder', {
    path: '', shared_link: { url: SHARED_URL }, recursive: false
  })
  .then(function(data) {
    if (data.error) {
      gallery.innerHTML = '<div class="dbx-error">Could not load images.</div>';
      return;
    }

    var images = (data.entries || []).filter(function(f) {
      return f['.tag'] === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name);
    });

    if (images.length === 0) { gallery.innerHTML = ''; return; }

    /* Fetch all temp links in parallel */
    return Promise.all(
      images.map(function(img) {
        return proxyFetch('files/get_temporary_link', { path: img.path_lower })
          .then(function(d) { return d.link || null; });
      })
    ).then(function(links) {
      var grid = document.createElement('div');
      grid.className = 'masonry';

      images.forEach(function(imgMeta, i) {
        if (!links[i]) return;
        var item = document.createElement('div');
        item.className = 'masonry-item';
        item.appendChild(makeFadeImg(links[i], imgMeta.name));
        grid.appendChild(item);
      });

      gallery.innerHTML = '';
      gallery.appendChild(grid);

      gallery.addEventListener('click', function(e) {
        var img = e.target.closest('img');
        if (img && img.classList.contains('loaded')) openLightbox(img.src, img.alt);
      });

      initLightboxControls();
    });
  })
  .catch(function(err) {
    gallery.innerHTML = '<div class="dbx-error">Gallery unavailable.</div>';
    console.error('Gallery 1 error:', err);
  });
})();
</script>
