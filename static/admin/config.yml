backend:
  name: github
  repo: cardopoli/this-was-tomorrow
  branch: main
  base_url: https://sveltia-cms-auth.cardopoli.workers.dev
site_url: https://thiswastomorrow.co.uk
display_url: https://thiswastomorrow.co.uk
media_folder: "static/images"
public_folder: "/images"

collections:

  - name: sites
    label: Sites
    label_singular: Site
    folder: content/sites
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}} — {{location}}"
    fields:

      # ---- IDENTITY ----
      - { name: title, label: Title, widget: string }
      - { name: location, label: Location, widget: string, required: false }
      - { name: status, label: Status, widget: select, options: ["visited", "scheduled", "planned"], default: planned, required: false }
      - { name: visit_date, label: Visit date, widget: string, required: false, hint: "e.g. April 2026" }
      - { name: draft, label: Hide from site, widget: boolean, default: false, required: false }

      # ---- HERO ----
      - { name: image, label: Hero image, widget: image, required: false }
      - { name: image_caption, label: Hero image caption, widget: string, required: false }

      # ---- CONTENT ----
      - { name: body, label: Text, widget: markdown, required: false, modes: [rich_text, raw], hint: "Main page text. Switch to raw mode to paste HTML embeds." }

      # ---- GALLERIES ----
      - { name: dropbox_gallery, label: Photo gallery (Dropbox folder), widget: string, required: false, hint: "Shared Dropbox folder link containing photos" }
      - { name: dropbox_gallery_2, label: Photo gallery 2 (Dropbox folder), widget: string, required: false, hint: "Optional second photo gallery" }
      - { name: dropbox_audio, label: Audio gallery (Dropbox folder), widget: string, required: false, hint: "Shared Dropbox folder link containing MP3 files" }

      # ---- ARCHIVE.ORG ----
      - name: archives
        label: Recordings (Archive.org)
        widget: list
        required: false
        hint: "Individual Archive.org recording links"
        fields:
          - { name: title, label: Title, widget: string }
          - { name: url, label: Archive.org URL, widget: string }
          - { name: note, label: Note, widget: text, required: false }

      # ---- SOURCES ----
      - name: sources
        label: Sources
        widget: list
        required: false
        fields:
          - { name: title, label: Title, widget: string }
          - { name: url, label: URL, widget: string }

  - name: pages
    label: Pages
    files:
      - name: about
        label: About
        file: content/about.md
        fields:
          - { name: title, label: Title, widget: string }
          - { name: description, label: Meta description, widget: string, required: false }
          - { name: layout, label: Layout, widget: hidden, default: about }
          - { name: body, label: Content, widget: markdown, modes: [rich_text, raw] }

      - name: homepage
        label: Homepage
        file: content/_index.md
        fields:
          - { name: title, label: Site title, widget: string }
          - { name: intro, label: Intro text, widget: text, hint: "The paragraph above the site list." }

      - name: map
        label: Map
        file: content/map.md
        fields:
          - { name: title, label: Title, widget: string }
          - { name: description, label: Meta description, widget: string, required: false }
          - { name: layout, label: Layout, widget: hidden, default: map }
