<!-- Global lightbox - rendered once, shared by all gallery instances -->
<div class="dbx-lightbox" id="dbxLightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <span class="dbx-lightbox-close" id="dbxClose" aria-label="Close">✕</span>
  <button class="dbx-prev" id="dbxPrev" aria-label="Previous photo"></button>
  <img id="dbxLightboxImg" src="" alt="">
  <button class="dbx-next" id="dbxNext" aria-label="Next photo"></button>
  <div class="dbx-counter" id="dbxCounter"></div>
</div>
