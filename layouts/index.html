{{ define "main" }}
<div class="site-index">
    <p class="intro">{{ .Params.intro }}</p>

    <ul class="site-list">
        {{ range (where .Site.RegularPages "Section" "sites").ByTitle }}
        <li>
            <a href="{{ .RelPermalink }}">
                <span class="name">{{ .Title }}</span>
                <span class="location">
                    {{ .Params.location }}
                    {{ if eq .Params.status "visited" }}<span class="visited-label">Visited</span>{{ end }}
                </span>
            </a>
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
