<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-gb" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} · {{ .Site.Title }}</title>
  <link rel="icon" href="{{ "favicon.png" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  <style>
    body.exhibit{ background: {{ .Params.exhibit_bg | default "#0a0a0a" }}; color: {{ .Params.exhibit_text | default "#f7f5f0" }}; min-height:100vh; }
    .exhibit-stage{ position:relative; min-height:100vh; overflow:hidden; }
    .exhibit-bg{ position:absolute; inset:0; z-index:0; background-size:cover; transform:scale(1.18); }
    .exhibit-scrim{ position:absolute; inset:0; z-index:1;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.05) 35%, rgba(0,0,0,0.6) 100%),
        rgba(0,0,0, var(--dim, 0.25)); }
    .exhibit-inner{ position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; max-width: {{ .Params.exhibit_width | default "460px" }}; margin:0 auto; width:100%; padding:34px 26px 30px; box-sizing:border-box; }
    .exhibit-question{ font-family:var(--mono); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; line-height:1.9; opacity:0.72; max-width:240px; }
    .exhibit-card{ margin-top:auto; background: {{ .Params.exhibit_card | default "rgba(12,14,11,0.42)" }}; backdrop-filter:blur(18px) saturate(1.1); -webkit-backdrop-filter:blur(18px) saturate(1.1); border:0.5px solid rgba(247,245,240,0.14); border-radius: {{ .Params.exhibit_radius | default "20px" }}; padding:22px; }
    .exhibit-title{ font-size: {{ .Params.exhibit_title_size | default "27px" }}; font-weight:800; line-height:1.05; letter-spacing:-0.4px; margin-bottom:10px; }
    .exhibit-who{ font-family:var(--mono); font-size:12px; letter-spacing:0.5px; color: {{ .Params.exhibit_accent | default "#27f5b0" }}; margin-bottom:2px; }
    .exhibit-where{ font-family:var(--mono); font-size:11px; letter-spacing:0.5px; opacity:0.55; margin-bottom:18px; }
    .exhibit-card .twt-playlist{ background:transparent !important; margin:0; }

    @media (min-width: 700px){
      .exhibit-inner{ justify-content:center; gap:38px; }
      .exhibit-card{ margin-top:0; }
    }
  </style>
</head>
<body class="exhibit">
  <div class="exhibit-stage">

    {{ with .Params.exhibit_image }}
      <div class="exhibit-bg" style="background-image:url('{{ . }}'); background-position: {{ $.Params.exhibit_image_pos | default "center" }}; filter: blur({{ $.Params.exhibit_blur | default "30px" }}) saturate(1.08);"></div>
      <div class="exhibit-scrim" style="--dim: {{ $.Params.exhibit_dim | default "0.25" }};"></div>
    {{ end }}

    <div class="exhibit-inner">

      {{ with .Params.exhibit_question }}
        <div class="exhibit-question">{{ . }}</div>
      {{ end }}

      <div class="exhibit-card">
        {{ with .Title }}<div class="exhibit-title">{{ . }}</div>{{ end }}
        {{ with .Params.exhibit_speaker }}<div class="exhibit-who">{{ . }}</div>{{ end }}
        {{ with .Params.location }}<div class="exhibit-where">{{ . }}</div>{{ end }}
        {{ .Content }}
      </div>

    </div>
  </div>
  <script src="{{ "JS/supercharged.js" | relURL }}"></script>
</body>
</html>
