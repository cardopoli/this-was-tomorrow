backend:
  name: github
  repo: cardopoli/this-was-tomorrow
  branch: main
site_url: https://thiswastomorrow.co.uk
display_url: https://thiswastomorrow.co.uk
media_folder: "static/images"
public_folder: "/images"
collections:
  - name: sites
    label: Sites
    folder: content/sites
    create: true
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: Site Title, widget: string }
      - { name: location, label: Location, widget: string, required: false }
      - { name: status, label: Status, widget: select, options: ["visited", "scheduled", "planned"], required: false }
      - { name: description, label: Short Description, widget: text, required: false }
      
      - name: photos
        label: Hero Photo
        widget: list
        required: false
        max: 1
        fields:
          - { name: image, label: Image, widget: image }
          - { name: caption, label: Caption, widget: string, required: false }
      
      - { name: body_intro, label: Text Before Gallery, widget: markdown, required: false }
      
      - { name: dropbox_gallery, label: Dropbox Gallery URL, widget: string, required: false, hint: "Paste the shared Dropbox folder link here" }
      
      - { name: body_middle, label: Text Between Galleries, widget: markdown, required: false }
      
      - { name: dropbox_gallery_2, label: Second Dropbox Gallery URL, widget: string, required: false, hint: "Optional - paste second Dropbox folder link here" }
      
      - { name: body, label: Content, widget: markdown, required: false, hint: "Main body text. Links should NOT go here — use the 'Bibliography' section below instead." }
      
      - name: links
        label: Bibliography / Sources
        widget: list
        required: false
        hint: "Links rendered as a separate bibliography section at the bottom. Keep links OUT of the main body text."
        fields:
          - { name: url, label: URL, widget: string, hint: "Full URL (will open in new tab)" }
          - { name: title, label: Title, widget: string, hint: "Link text / source title" }
          - { name: source, label: Source, widget: string, required: false, hint: "Optional - e.g. 'The Guardian', 'Wikipedia', 'Architectural Review'" }
