<body>
  <div class="wrap">

    {{ with .Params.exhibit_image }}
      <div class="photo-hero">
        <img src="{{ . }}" alt="{{ $.Params.location }}">
      </div>
    {{ end }}

    {{ with .Params.location }}
      <div class="meta">{{ . }}</div>
    {{ end }}

    {{ with .Params.dropbox_folder }}
      <div id="twt-exhibit-playlist"></div>

      <script>
      (function() {
        function init() {
          if (window._twt && window._twt.buildAudioPlaylist) {
            window._twt.buildAudioPlaylist(
              'https://dropbox-proxy.cardopoli.workers.dev',
              '{{ . }}',
              'twt-exhibit-playlist'
            );
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', init);
        } else {
          init();
        }
      })();
      </script>
    {{ end }}

  </div>

  <script src="/JS/supercharged.js"></script>
</body>
