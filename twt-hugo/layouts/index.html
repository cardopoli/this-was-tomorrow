{{ define "main" }}
<div class="site-index">
    <p class="intro">An archive of site visits documenting how communities adapt and sustain places they inherit. Photography, audio, context.</p>

    <ul class="site-list">
        {{ range (where .Site.RegularPages "Section" "sites").ByTitle }}
        <li>
            <a href="{{ .RelPermalink }}">
                <span class="name">{{ .Title }}</span>
                <span class="location">{{ .Params.location }}</span>
            </a>
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
